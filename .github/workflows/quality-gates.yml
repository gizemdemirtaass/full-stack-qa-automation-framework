name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox
      - name: Type check
        run: npm run typecheck
      - name: Run Playwright tests
        run: npm run test:ui
      - name: Upload UI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-and-allure-results
          path: |
            playwright-report
            allure-results

  api-contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Start test application
        run: |
          node app/server.js > app.log 2>&1 &
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:3000/health && break
            sleep 1
          done
      - name: Run REST Assured tests
        run: mvn -f api-tests/pom.xml test
      - name: Upload API Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results
          path: allure-results

  performance-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Start test application
        run: |
          node app/server.js > app.log 2>&1 &
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:3000/health && break
            sleep 1
          done
      - uses: grafana/setup-k6-action@v1
      - name: Run k6 thresholds
        run: k6 run performance-tests/storefront-load.js
