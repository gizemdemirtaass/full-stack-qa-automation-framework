openapi: 3.1.0
info:
  title: Quality Market API
  version: 1.0.0
  description: Contract for the self-contained QA automation portfolio storefront.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      operationId: healthCheck
      responses:
        '200':
          description: Service is available
          content:
            application/json:
              schema:
                type: object
                required: [status, service]
                properties:
                  status: { type: string, const: UP }
                  service: { type: string }
  /api/products:
    get:
      operationId: listProducts
      parameters:
        - in: query
          name: category
          schema: { type: string, enum: [Audio, Office] }
      responses:
        '200':
          description: Product collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList'
  /api/products/{productId}:
    get:
      operationId: getProduct
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Product
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404':
          description: Product not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /api/orders:
    post:
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrderRequest' }
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '400':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /api/orders/{orderId}:
    get:
      operationId: getOrder
      parameters:
        - in: path
          name: orderId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '404':
          description: Order not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
components:
  schemas:
    Product:
      type: object
      required: [id, name, category, price, stock]
      properties:
        id: { type: integer, minimum: 1 }
        name: { type: string }
        category: { type: string, enum: [Audio, Office] }
        price: { type: number, exclusiveMinimum: 0 }
        stock: { type: integer, minimum: 0 }
    ProductList:
      type: object
      required: [items, count]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Product' }
        count: { type: integer, minimum: 0 }
    OrderItem:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: integer, minimum: 1 }
        quantity: { type: integer, minimum: 1 }
    CreateOrderRequest:
      type: object
      required: [customerEmail, items]
      properties:
        customerEmail: { type: string, format: email }
        items:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/OrderItem' }
    Order:
      allOf:
        - $ref: '#/components/schemas/CreateOrderRequest'
        - type: object
          required: [id, status, createdAt]
          properties:
            id: { type: string, format: uuid }
            status: { type: string, enum: [CREATED] }
            createdAt: { type: string, format: date-time }
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
